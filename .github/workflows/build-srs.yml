name: build-srs

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  push:
    branches: ["main"]

permissions:
  contents: write

concurrency:
  group: build-srs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --no-cache-dir pyyaml

      - name: Download sing-box
        run: |
          set -e
          VERSION=1.13.0
          ARCHIVE="sing-box-${VERSION}-linux-amd64.tar.gz"
          URL="https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/${ARCHIVE}"

          curl -L -o sing-box.tar.gz "$URL"
          tar -xzf sing-box.tar.gz
          DIR=$(find . -maxdepth 1 -type d -name "sing-box-*" | head -n 1)
          cp "$DIR/sing-box" /usr/local/bin/sing-box
          chmod +x /usr/local/bin/sing-box

          sing-box version

      - name: Fetch Clash YAML
        run: |
          curl -L \
            -o clV2_provider.yaml \
            https://raw.githubusercontent.com/Nemu-x/privWL-clash/main/clV2_provider.yaml

      - name: Convert Clash YAML -> sing-box source rule-set
        run: |
          python scripts/clash2srs.py clV2_provider.yaml privwl.json
          echo "----- privwl.json preview -----"
          sed -n '1,80p' privwl.json
          echo "-------------------------------"

      - name: Compile source rule-set -> binary rule-set
        run: |
          sing-box rule-set compile --output privwl.srs privwl.json

      - name: Validate outputs
        run: |
          ls -lh privwl.json privwl.srs
          file privwl.json
          file privwl.srs
          if file privwl.srs | grep -qi "text"; then
            echo "ERROR: privwl.srs is TEXT, expected BINARY"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add privwl.json privwl.srs

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "auto: rebuild privwl.srs"
          git push
